<!DOCTYPE html>
<html>
<head>
  <title>YouTube Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {background:#111;color:#fff;font-family:sans-serif;text-align:center}
    input,button{padding:10px;margin:5px;border-radius:5px;border:none}
    button{background:red;color:white}
    .card{background:#222;padding:15px;margin:10px;border-radius:10px}
  </style>
</head>
<body>

<h1>YouTube Dashboard</h1>

<input id="video" placeholder="Video ID">
<button onclick="addVideo()">Add Video</button>

<input id="channel" placeholder="Channel ID">
<button onclick="addChannel()">Add Channel</button>

<div id="videos"></div>
<div id="channels"></div>

<canvas id="chart"></canvas>

<script>
const API_KEY = "AIzaSyAMWMIMz-otNn2qNxma4Aii6A5rqMy2d5o";

let videos=[], channels=[], history={}, chart;

function addVideo(){
  const id=document.getElementById("video").value;
  if(!id) return;
  videos.push(id);
  history[id]=[];

  const div=document.createElement("div");
  div.className="card";
  div.id=id;
  div.innerHTML=`Video ${id}<br><span class="views"></span>`;
  document.getElementById("videos").appendChild(div);
}

function addChannel(){
  const id=document.getElementById("channel").value;
  if(!id) return;
  channels.push(id);

  const div=document.createElement("div");
  div.className="card";
  div.id="ch_"+id;
  div.innerHTML=`Channel ${id}<br><span class="subs"></span>`;
  document.getElementById("channels").appendChild(div);
}

async function fetchData(){
  if(videos.length){
    const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videos.join(",")}&key=${API_KEY}`);
    const data=await res.json();

    data.items.forEach(v=>{
      const views=v.statistics.viewCount;
      document.querySelector(`#${v.id} .views`).innerText="Views: "+views;
      history[v.id].push(views);
    });
  }

  if(channels.length){
    const res=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channels.join(",")}&key=${API_KEY}`);
    const data=await res.json();

    data.items.forEach(c=>{
      document.querySelector(`#ch_${c.id} .subs`).innerText="Subs: "+c.statistics.subscriberCount;
    });
  }

  updateChart();
}

function updateChart(){
  if(!videos.length) return;

  const labels=history[videos[0]].map((_,i)=>i);
  const datasets=videos.map(id=>({label:id,data:history[id]}));

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels,datasets}
  });
}

setInterval(fetchData,5000);
</script>

</body>
</html>
