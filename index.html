<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Live Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: red;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #222;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>
<body>

  <h1>YouTube Multi Video Dashboard</h1>

  <input id="videoId" placeholder="Enter YouTube Video ID">
  <button onclick="addVideo()">Add Video</button>

  <div id="videos"></div>

  <canvas id="chart" width="600" height="300"></canvas>

<script>
const API_KEY = "AIzaSyAMWMIMz-otNn2qNxma4Aii6A5rqMy2d5o";
let videoIds = [];
let viewHistory = {};
let chart;

function addVideo() {
  const id = document.getElementById("videoId").value;
  if (!id) return;

  videoIds.push(id);
  viewHistory[id] = [];

  const div = document.createElement("div");
  div.className = "card";
  div.id = id;
  div.innerHTML = `
    <h3>${id}</h3>
    <p>Views: <span class="views">Loading...</span></p>
  `;

  document.getElementById("videos").appendChild(div);
}

async function fetchData() {
  if (videoIds.length === 0) return;

  const ids = videoIds.join(",");

  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${API_KEY}`
  );

  const data = await res.json();

  data.items.forEach(video => {
    const views = parseInt(video.statistics.viewCount);

    document.querySelector(`#${video.id} .views`).innerText = views;

    viewHistory[video.id].push(views);
  });

  updateChart();
}

function updateChart() {
  const labels = Array.from({length: viewHistory[videoIds[0]]?.length || 0}, (_, i) => i);

  const datasets = videoIds.map(id => ({
    label: id,
    data: viewHistory[id],
    borderWidth: 2
  }));

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");
  chart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets }
  });
}

setInterval(fetchData, 5000);
</script>

</body>
</html>
